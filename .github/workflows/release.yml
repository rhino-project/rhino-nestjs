# -------------------------------------------------------------------------
# Continuous Deployment via npm Trusted Publisher (OIDC)
# -------------------------------------------------------------------------
#
# This workflow publishes @rhino-dev/rhino-nestjs to npm without
# ever holding an NPM_TOKEN secret. npm accepts a short-lived OIDC token
# minted by GitHub Actions and exchanges it for a scoped publish token
# on the fly.
#
# One-time setup on the npm side:
#
#   1. Go to https://www.npmjs.com/package/@rhino-dev/rhino-nestjs/access
#      (or Manage → Settings → Trusted Publisher)
#   2. Click "Configure Trusted Publisher"
#   3. Fill in:
#        Publisher:     GitHub Actions
#        Organization:  rhino-project
#        Repository:    rhino-nestjs
#        Workflow:      release.yml       ← must match this filename
#        Environment:   (leave blank)     ← simpler: no env claim to match
#   4. Save.
#
# Requirements:
#   - npm >= 11.5.1 (setup-node@v4 installs a compatible version by default;
#     we pin `npm-version: latest` to be explicit)
#   - `id-token: write` permission on the publish job (OIDC handshake)
#   - Trusted Publisher must be configured on EVERY package you publish
#     under the scope (one per package).
#
# How to cut a release:
#
#   # 1. Bump the version in package.json and merge to main
#   npm version 0.3.0 --no-git-tag-version
#   git commit -am "chore: release v0.3.0"
#   git push
#
#   # 2. Create a GitHub Release (UI or CLI)
#   gh release create v0.3.0 --generate-notes
#
#   → This workflow fires, runs the full test matrix, verifies the
#     package.json version matches the tag, builds, and publishes with
#     provenance.
#
# For re-runs / emergency republishes: use the `workflow_dispatch` trigger
# from the Actions tab.
# -------------------------------------------------------------------------

name: Release to npm (Trusted Publisher)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.3.0). Leave blank to publish the version in package.json on the default branch.'
        required: false
        type: string

concurrency:
  group: npm-release-${{ github.event.release.tag_name || inputs.tag || 'dispatch' }}
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------
  # 1. Full test matrix — must pass before we touch npm
  # --------------------------------------------------------------------
  tests:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Run tests
        run: npx jest --ci --runInBand

  # --------------------------------------------------------------------
  # 2. Publish — gated on tests; uses OIDC (no NPM_TOKEN)
  # --------------------------------------------------------------------
  publish:
    name: Publish to npm
    needs: tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for OIDC handshake with npm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node 22 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm to a version that supports Trusted Publishing
        # npm Trusted Publisher + OIDC requires a recent npm. Node 22 ships
        # with npm 10.x which is too old. Early TP releases (e.g. 11.5.2)
        # have OIDC token-exchange bugs that cause the publish PUT to land
        # unauthenticated (404), so install the latest. `npm install -g`
        # via sudo does a fresh install and sidesteps the self-upgrade
        # corruption bug (MODULE_NOT_FOUND: promise-retry).
        run: |
          sudo npm install -g npm@latest
          npm --version

      - name: Derive expected version
        id: version
        run: |
          # Prefer the release tag (v0.3.0 → 0.3.0); fall back to package.json
          # when running via workflow_dispatch without an input tag.
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -n "$TAG" ]; then
            VERSION_NO_V="${TAG#v}"
          else
            VERSION_NO_V=$(node -p "require('./package.json').version")
          fi
          echo "tag=v$VERSION_NO_V" >> "$GITHUB_OUTPUT"
          echo "bare=$VERSION_NO_V" >> "$GITHUB_OUTPUT"

      - name: Verify package.json matches the release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.version.outputs.bare }}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($EXPECTED)"
            echo "::error::Bump package.json to $EXPECTED and re-cut the release."
            exit 1
          fi
          echo "✓ package.json @ $PKG_VERSION matches release $EXPECTED"

      - name: Abort if version already exists on npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::$PKG@$VER is already published to npm."
            echo "::error::Bump the version before retrying."
            exit 1
          fi
          echo "✓ $PKG@$VER is not yet published"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance (Trusted Publisher — OIDC)
        # No NODE_AUTH_TOKEN. npm CLI uses the GitHub OIDC token to obtain
        # a scoped publish token from the registry.
        run: npm publish --access public --provenance

      - name: Summary
        run: |
          echo "## Published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: $(node -p "require('./package.json').name")" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.bare }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provenance: attached (SLSA)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
