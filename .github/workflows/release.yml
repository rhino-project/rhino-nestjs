# -------------------------------------------------------------------------
# Continuous Deployment via npm Trusted Publisher (OIDC)
# -------------------------------------------------------------------------
#
# This workflow publishes @rhino-dev/rhino-nestjs to npm without
# ever holding an NPM_TOKEN secret. npm accepts a short-lived OIDC token
# minted by GitHub Actions and exchanges it for a scoped publish token
# on the fly.
#
# One-time setup on the npm side:
#
#   1. Go to https://www.npmjs.com/package/@rhino-dev/rhino-nestjs/access
#      (or Manage → Settings → Trusted Publisher)
#   2. Click "Configure Trusted Publisher"
#   3. Fill in:
#        Publisher:     GitHub Actions
#        Organization:  rhino-project
#        Repository:    rhino-nestjs
#        Workflow:      release.yml       ← must match this filename
#        Environment:   (leave blank)     ← simpler: no env claim to match
#   4. Save.
#
# How to cut a release (same mechanism as rhino-react):
#
#   # 1. Bump the version in package.json and commit to main
#   npm version 4.1.0 --no-git-tag-version
#   git commit -am "Bump version to 4.1.0"
#   git push origin main
#
#   # 2. Create and push a release branch — this fires the workflow
#   git checkout -b release/v4.1.0 main
#   git push -u origin release/v4.1.0
#
#   → The workflow runs the test matrix, verifies package.json matches the
#     branch version, publishes to npm with provenance, and only then
#     creates the git tag and GitHub Release.
# -------------------------------------------------------------------------

name: Release to npm (Trusted Publisher)

on:
  push:
    branches:
      - 'release/v*'

concurrency:
  group: npm-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------
  # 1. Full test matrix — must pass before we touch npm
  # --------------------------------------------------------------------
  tests:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Run tests
        run: npx jest --ci --runInBand

  # --------------------------------------------------------------------
  # 2. Publish — gated on tests; uses OIDC (no NPM_TOKEN). The git tag
  #    and GitHub Release are created only AFTER a successful publish.
  # --------------------------------------------------------------------
  release:
    name: Publish, then tag and release
    needs: tests
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write # required for OIDC handshake with npm

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        # NOTE: do NOT set registry-url here. It makes setup-node write an
        # .npmrc with `_authToken=${NODE_AUTH_TOKEN}`; with no token present
        # (we publish via OIDC), npm sends empty auth on the PUT and the
        # registry returns 404. Trusted publishing needs a clean .npmrc.

      - name: Upgrade npm to a version that supports Trusted Publishing
        # npm Trusted Publisher + OIDC requires npm >= 11.5.1; Node 22 ships
        # npm 10.x. Do NOT use sudo here: `sudo npm install -g` installs to a
        # root-owned prefix that is not on the runner user's PATH, so the old
        # npm 10.x keeps running for `npm publish` (no OIDC → ENEEDAUTH/404).
        # A plain user-level global install puts npm 11.x on PATH.
        run: |
          npm install -g npm@latest
          npm --version

      - name: Extract version from branch name
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify package.json matches the release branch
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release branch ($EXPECTED)"
            echo "::error::Bump package.json to $EXPECTED and re-cut the release branch."
            exit 1
          fi
          echo "✓ package.json @ $PKG_VERSION matches release $EXPECTED"

      - name: Abort if version already exists on npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::$PKG@$VER is already published to npm."
            echo "::error::Bump the version before retrying."
            exit 1
          fi
          echo "✓ $PKG@$VER is not yet published"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance (Trusted Publisher — OIDC)
        # No NODE_AUTH_TOKEN. npm CLI uses the GitHub OIDC token to obtain
        # a scoped publish token from the registry.
        run: npm publish --access public --provenance

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Summary
        run: |
          echo "## Published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: $(node -p "require('./package.json').name")" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provenance: attached (SLSA)" >> "$GITHUB_STEP_SUMMARY"
